name: Python CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint:
    name: Static Code Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pylint
        run: |
          python -m pip install --upgrade pip
          pip install pylint

      - name: Run pylint and enforce score
        run: |
          echo "Running pylint..."
          SCORE=$(pylint app.py | awk '/rated at/ {print $7}' | cut -d'/' -f1)

          echo "Pylint score: $SCORE"

          python -c "import sys; sys.exit(1 if float('$SCORE') < 7.0 else 0)"

  secret-scan:
    name: Secret Scanning with trufflehog
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Secret Scanning
      uses: trufflesecurity/trufflehog@main
      with:
        extra_args: --results=verified,unknown

  dependency-scan:
    name: Dependency Check with Trivy 
    runs-on: ubuntu-latest
    needs: [secret-scan, lint]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run Trivy vulnerability scanner (Filesystem)
      uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # Use a pinned SHA!
      with:
        scan-type: 'fs'
        scan-ref: '.'
        # 'vuln' finds library bugs; 'config' finds Dockerfile/IaC issues
        scanners: 'vuln,config' 
        format: 'table'
        exit-code: '1'
        severity: 'CRITICAL'


  build_scan_and_push:
    name: Build, Scan and PushDocker Image
    runs-on: ubuntu-latest
    needs: dependency-scan

    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t helentam93/python_app:latest .

      - name: Scan image
        uses: aquasecurity/trivy-action@v0.20.0
        with:
          image-ref: helentam93/python_app:latest
          severity: CRITICAL
          exit-code: '1'

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build image
        run: docker build -t helentam93/python_app:latest .

      - name: Push image
        run: docker push helentam93/python_app:latest

  smoke-test:
    name: Smoke Test Docker Image
    runs-on: ubuntu-latest
    needs: build_scan_and_push

    steps:
    - name: Pull Docker image
      run: docker pull helentam93/python_app:latest

    - name: Run container
      run: |
        docker run -d --name app -p 8000:8000 helentam93/python_app:latest
        sleep 5

    - name: Check container is running
      run: docker ps | grep app

    - name: Basic health check (example)
      run: |
        curl --fail http://localhost:8000 || (docker logs app && exit 1)

    - name: Cleanup
      run: docker stop app && docker rm app